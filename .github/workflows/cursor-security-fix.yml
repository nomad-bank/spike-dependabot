name: Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      package_root:
        description: Caminho relativo ao package.json (ex. . ou subpasta)
        required: false
        default: '.'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      SECURITY_PACKAGE_ROOT: ${{ github.event.inputs.package_root || vars.SECURITY_PACKAGE_ROOT || '.' }}

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}" ]; then
            echo "::error::GH_DEPENDABOT_ALERTS_TOKEN is not set. PAT com leitura de Dependabot alerts (classic: scope security_events ou repo; fine-grained: Dependabot alerts Read). Na org com SAML, autorize o token em Settings → Tokens → Configure SSO."
            exit 1
          fi
          if [ -z "${{ secrets.CURSOR_TOKEN }}" ]; then
            echo "::error::CURSOR_TOKEN is not set. An API key from cursor.com/dashboard/cloud-agents is required."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: '${{ env.SECURITY_PACKAGE_ROOT }}/pnpm-lock.yaml'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd "${SECURITY_PACKAGE_ROOT}"
          if [ -f pnpm-lock.yaml ] || [ -f "../../pnpm-workspace.yaml" ]; then
            pnpm install --no-frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install
          else
            npm install
          fi

      - name: Execute Cursor Fix Logic
        env:
          GH_TOKEN: ${{ github.token }}
          GH_DEPENDABOT_ALERTS_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: node "${SECURITY_PACKAGE_ROOT}/scripts/cursor-fixer.js"
